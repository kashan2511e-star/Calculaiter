<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.calculator {
  width: 340px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.display {
  width: 100%;
  height: 70px;
  border: none;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 22px;
  text-align: right;
  padding: 10px;
  outline: none;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.number { background: rgba(255,255,255,0.2); color: white; }
.operator { background: #ff9f43; color: white; }
.func { background: #00c6ff; color: black; }
.equal { background: #00c853; color: white; grid-column: span 2; }
.clear { background: #ff5252; color: white; }

</style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" class="display" disabled>

  <div class="buttons">
    <button class="func" onclick="append('Math.sin(')">sin</button>
    <button class="func" onclick="append('Math.cos(')">cos</button>
    <button class="func" onclick="append('Math.tan(')">tan</button>
    <button class="func" onclick="append('Math.log10(')">log</button>
    <button class="clear" onclick="clearDisplay()">C</button>

    <button class="func" onclick="append('Math.sqrt(')">√</button>
    <button class="func" onclick="append('**')">xʸ</button>
    <button class="func" onclick="append('Math.PI')">π</button>
    <button class="operator" onclick="append('/')">÷</button>
    <button class="operator" onclick="append('*')">×</button>

    <button class="number" onclick="append('7')">7</button>
    <button class="number" onclick="append('8')">8</button>
    <button class="number" onclick="append('9')">9</button>
    <button class="operator" onclick="append('-')">−</button>
    <button class="operator" onclick="append('+')">+</button>

    <button class="number" onclick="append('4')">4</button>
    <button class="number" onclick="append('5')">5</button>
    <button class="number" onclick="append('6')">6</button>
    <button class="func" onclick="append('(')">(</button>
    <button class="func" onclick="append(')')">)</button>

    <button class="number" onclick="append('1')">1</button>
    <button class="number" onclick="append('2')">2</button>
    <button class="number" onclick="append('3')">3</button>
    <button class="number" onclick="append('0')">0</button>
    <button class="number" onclick="append('.')">.</button>

    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}
</script>

</body>
</html>
